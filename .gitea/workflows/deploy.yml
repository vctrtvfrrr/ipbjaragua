name: build-and-deploy

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: registry.codelab.tec.br
  IMAGE: registry.codelab.tec.br/codelab/ipbjaragua

jobs:
  validate:
    runs-on: ubuntu-latest
    container:
      image: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt
        run: pnpm nuxt prepare

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test:coverage

  build-and-deploy:
    needs: validate
    runs-on: ubuntu-latest
    container:
      image: catthehacker/ubuntu:act-latest
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - /opt/compose:/opt/compose
    steps:
      - uses: actions/checkout@v4

      - name: Registry login
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login "${REGISTRY}" -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            .

      - name: Push image
        run: |
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Deploy stack
        uses: https://git.codelab.tec.br/codelab/deploy-stack@master
        with:
          service: ipbjaragua
          bw-server: ${{ secrets.BW_SERVER }}
          bw-clientid: ${{ secrets.BW_CLIENTID }}
          bw-clientsecret: ${{ secrets.BW_CLIENTSECRET }}
          bw-password: ${{ secrets.BW_PASSWORD }}
          env-overrides: |
            DATABASE_URL=/app/data/db.sqlite
